services:

api:

```
build: .

container_name: clauseguard-api

command: uvicorn api.main:app --host 0.0.0.0 --port 8000

ports:

  - "8000:8000"

env_file:

  - .env
```

ui:

```
build: .

container_name: clauseguard-ui

command: streamlit run ui/app.py --server.address=0.0.0.0

ports:

  - "8501:8501"

env_file:

  - .env

depends_on:

  - api
```
